<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>html,body{margin:0;background:#1b1b1d;font-family:var(--font-body)}.stage{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;gap:40px;padding:40px;box-sizing:border-box;flex-wrap:wrap}</style>
</head><body>
<div class="stage"><div id="root" style="display:contents"></div></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
(async function(){
  const run = (code, tag) => {
    let out;
    try { out = Babel.transform(code, { presets: [['react', { runtime: 'classic' }]] }).code; }
    catch(e){ console.error('TRANSFORM FAIL ['+tag+']', e.message); throw e; }
    try { (0, eval)(out); }
    catch(e){ console.error('EVAL FAIL ['+tag+']', e.message, '\nHEAD:\n'+out.slice(0,200)); throw e; }
  };
  const bundle = await (await fetch('preview_bundle.txt')).text();
  run(bundle, 'bundle');

  const demo = `
    const { PhoneFrame, TabBar, ExploreScreen, RunsScreen, RunDetailScreen, ProfileScreen } = window.RE;
    const ic=(d)=>(<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>);
    const nav=[
      {id:'explore',label:'Explore',icon:ic(<><circle cx="12" cy="12" r="9"/><polygon points="16 8 13 13 8 16 11 11"/></>)},
      {id:'runs',label:'Runs',icon:ic(<><circle cx="6" cy="19" r="2.4"/><circle cx="18" cy="6" r="2.4"/><path d="M8.2 18h6.3a3 3 0 0 0 0-6h-5a3 3 0 0 1 0-6H16"/></>)},
      {id:'messages',label:'Chat',icon:ic(<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>)},
      {id:'profile',label:'You',icon:ic(<><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></>)},
    ];
    function Demo({which}){
      const [tab,setTab]=React.useState(which);
      const [detail,setDetail]=React.useState(false);
      let s;
      if(detail) s=<RunDetailScreen onBack={()=>setDetail(false)}/>;
      else if(tab==='explore') s=<ExploreScreen onOpenRun={()=>setDetail(true)}/>;
      else if(tab==='runs') s=<RunsScreen onOpenRun={()=>setDetail(true)}/>;
      else if(tab==='profile') s=<ProfileScreen self/>;
      else s=<div style={{flex:1,background:'var(--paper-2)'}}/>;
      return (<PhoneFrame dark={tab==='profile'&&!detail}>
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>{s}</div>
        {!detail && <TabBar value={tab} onChange={setTab} onCreate={()=>{}} items={nav}/>}
      </PhoneFrame>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(
      <><Demo which="profile"/><Demo which="explore"/><PhoneFrame><RunDetailScreen/></PhoneFrame><Demo which="runs"/></>
    );
  `;
  run(demo, 'demo');
})();
</script>
</body></html>
