<!-- @dsCard group="Colors" viewport="700x150" name="Functional signals" subtitle="Live/verified, caution, destructive, rating gold." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--paper);padding:20px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:150px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--ink-200)}
  .c{height:52px;display:flex;align-items:center;padding:0 12px;color:#fff;font-family:var(--font-display);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:13px}
  .m{padding:6px 10px;font-size:11px;color:var(--ink-500);font-variant-numeric:tabular-nums}
</style></head>
<body>
  <div class="sw"><div class="c" style="background:var(--go)">Go / Live</div><div class="m">#00C271 · verified, GPS</div></div>
  <div class="sw"><div class="c" style="background:var(--warn);color:var(--ink-900)">Warn</div><div class="m">#FFB020 · pending</div></div>
  <div class="sw"><div class="c" style="background:var(--danger)">Danger</div><div class="m">#E5342A · report, error</div></div>
  <div class="sw"><div class="c" style="background:var(--star);color:var(--ink-900)">★ Star</div><div class="m">#FFC32B · ratings</div></div>
</body></html>
