<!-- @dsCard group="Colors" viewport="700x180" name="Volt — hero accent" subtitle="Primary action color. Always pairs with near-black ink." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--paper);padding:20px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--ink-200);width:150px}
  .chip{height:74px;display:flex;align-items:flex-end;padding:8px}
  .meta{padding:8px 10px}
  .name{font-family:var(--font-display);font-weight:800;text-transform:uppercase;letter-spacing:var(--track-caps);font-size:14px;color:var(--ink-900)}
  .hex{font-size:12px;color:var(--ink-500);font-variant-numeric:tabular-nums}
  .tag{font-family:var(--font-display);font-weight:900;text-transform:uppercase;font-size:13px}
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:var(--volt)"><span class="tag" style="color:var(--volt-ink)">RUN ▸</span></div><div class="meta"><div class="name">Volt</div><div class="hex">#CCFF00</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--volt-bright)"></div><div class="meta"><div class="name">Volt Bright</div><div class="hex">#DBFF3D</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--volt-press)"></div><div class="meta"><div class="name">Volt Press</div><div class="hex">#B2E000</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-900)"><span class="tag" style="color:var(--volt)">RUN ▸</span></div><div class="meta"><div class="name">Ink 900</div><div class="hex">#0B0B0C</div></div></div>
</body></html>
