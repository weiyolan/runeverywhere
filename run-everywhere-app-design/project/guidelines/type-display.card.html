<!-- @dsCard group="Type" viewport="700x230" name="Display scale — Saira Condensed" subtitle="Uppercase, heavy, tight. Headlines & screen titles." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--paper);padding:22px 24px;color:var(--ink-900)}
  .d{font-family:var(--font-display);text-transform:uppercase;line-height:var(--lh-tight);letter-spacing:var(--track-caps);font-weight:900;margin:0 0 10px}
  .row{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
  .spec{font-family:var(--font-body);font-size:11px;color:var(--ink-400);text-transform:none;letter-spacing:0;font-weight:500}
</style></head>
<body>
  <div class="row"><span class="d" style="font-size:64px">42.5</span><span class="spec">Hero metric · 64 / 900</span></div>
  <div class="row"><span class="d" style="font-size:40px">Run Everywhere</span><span class="spec">Display 1 · 40 / 900</span></div>
  <div class="row"><span class="d" style="font-size:30px;font-weight:800">Runs near you</span><span class="spec">Display 2 · 30 / 800</span></div>
  <div class="row"><span class="d" style="font-size:22px;font-weight:800">Sunrise Old-Town Loop</span><span class="spec">Display 3 · 22 / 800</span></div>
  <div class="row"><span class="d" style="font-size:13px;letter-spacing:.08em">▸ MANAGED BY YOU</span><span class="spec">Eyebrow · 13 / 800 · +0.08em</span></div>
</body></html>
