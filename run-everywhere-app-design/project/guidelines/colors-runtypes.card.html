<!-- @dsCard group="Colors" viewport="700x200" name="Run-type system" subtitle="DISCOVER / CHALLENGE / SOCIAL — the category backbone." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--paper);padding:20px;display:flex;gap:14px}
  .t{flex:1;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--ink-200)}
  .cap{height:96px;display:flex;flex-direction:column;justify-content:space-between;padding:12px}
  .name{font-family:var(--font-display);font-weight:900;text-transform:uppercase;font-size:22px;letter-spacing:var(--track-caps);line-height:1}
  .desc{font-size:11px;opacity:.92}
  .soft{display:flex;align-items:center;gap:8px;padding:10px 12px;font-size:11px;color:var(--ink-500);font-variant-numeric:tabular-nums}
  .dot{width:14px;height:14px;border-radius:var(--r-pill)}
</style></head>
<body>
  <div class="t">
    <div class="cap" style="background:var(--discover);color:#fff"><span class="desc">Explore a city / new route</span><span class="name">Discover</span></div>
    <div class="soft" style="background:var(--discover-soft)"><span class="dot" style="background:var(--discover)"></span>#1463FF</div>
  </div>
  <div class="t">
    <div class="cap" style="background:var(--challenge);color:#fff"><span class="desc">Race pace / hard effort</span><span class="name">Challenge</span></div>
    <div class="soft" style="background:var(--challenge-soft)"><span class="dot" style="background:var(--challenge)"></span>#FF3D2E</div>
  </div>
  <div class="t">
    <div class="cap" style="background:var(--social);color:#fff"><span class="desc">Easy · meet-up · recovery</span><span class="name">Social</span></div>
    <div class="soft" style="background:var(--social-soft)"><span class="dot" style="background:var(--social)"></span>#7C5CFC</div>
  </div>
</body></html>
