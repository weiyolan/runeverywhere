<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px base grid with half-steps for dense mobile UI." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--paper);padding:22px;display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--volt);border-radius:var(--r-xs)}
  .v{font-size:11px;color:var(--ink-500);font-variant-numeric:tabular-nums}
  .n{font-family:var(--font-display);font-weight:800;font-size:12px;text-transform:uppercase}
</style></head>
<body>
  <div class="col"><div class="bar" style="width:24px;height:4px"></div><div class="n">1</div><div class="v">4</div></div>
  <div class="col"><div class="bar" style="width:24px;height:8px"></div><div class="n">2</div><div class="v">8</div></div>
  <div class="col"><div class="bar" style="width:24px;height:12px"></div><div class="n">3</div><div class="v">12</div></div>
  <div class="col"><div class="bar" style="width:24px;height:16px"></div><div class="n">4</div><div class="v">16</div></div>
  <div class="col"><div class="bar" style="width:24px;height:24px"></div><div class="n">6</div><div class="v">24</div></div>
  <div class="col"><div class="bar" style="width:24px;height:32px"></div><div class="n">8</div><div class="v">32</div></div>
  <div class="col"><div class="bar" style="width:24px;height:48px"></div><div class="n">12</div><div class="v">48</div></div>
  <div class="col"><div class="bar" style="width:24px;height:64px"></div><div class="n">16</div><div class="v">64</div></div>
</body></html>
