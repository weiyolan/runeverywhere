# Supabase local development config — https://supabase.com/docs/guides/local-development/cli/config
project_id = "runeverywhere"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "runeverywhere://"
additional_redirect_urls = ["runeverywhere://**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[auth.email]
enable_signup = true
enable_confirmations = false # enable in hosted project for production

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "10MiB"

[edge_runtime]
enabled = true
